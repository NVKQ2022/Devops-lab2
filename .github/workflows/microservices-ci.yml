name: Microservices CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'helm-chart/**'
      - '.github/workflows/microservices-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'helm-chart/**'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag'
        required: true
        default: 'latest'

jobs:
  # sonarqube:
  #   name: SonarQube Code Quality
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #       with:
  #         fetch-depth: 0

  #     - name: SonarQube Scan
  #       uses: sonarsource/sonarqube-scan-action@v5
  #       env:
  #         SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  #         SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy Source Scan
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: fs
          scan-ref: src/
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

      - name: Trivy Helm Scan
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: config
          scan-ref: helm-chart/
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

  snyk:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Snyk Source Scan
        uses: snyk/actions@v0.4.0
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          args: --file=sonar-project.properties

      - name: Snyk IaC Scan
        uses: snyk/actions@v0.4.0
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: iac
          args: terraform/

  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [trivy]
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        service:
          - adservice
          - cartservice
          - checkoutservice
          - currencyservice
          - emailservice
          - frontend
          - loadgenerator
          - paymentservice
          - productcatalogservice
          - recommendationservice
          - shippingservice
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        if: matrix.service == 'checkoutservice' || matrix.service == 'frontend' || matrix.service == 'productcatalogservice' || matrix.service == 'shippingservice'
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Setup Node.js
        if: matrix.service == 'currencyservice' || matrix.service == 'paymentservice'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/${{ matrix.service }}/package-lock.json

      - name: Setup Python
        if: matrix.service == 'emailservice' || matrix.service == 'loadgenerator' || matrix.service == 'recommendationservice'
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: src/${{ matrix.service }}/requirements.txt

      - name: Setup Java
        if: matrix.service == 'adservice'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup .NET
        if: matrix.service == 'cartservice'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Install Python deps
        if: matrix.service == 'emailservice' || matrix.service == 'loadgenerator' || matrix.service == 'recommendationservice'
        run: pip install -r requirements.txt
        working-directory: src/${{ matrix.service }}

      - name: Install Node deps
        if: matrix.service == 'currencyservice' || matrix.service == 'paymentservice'
        run: npm ci
        working-directory: src/${{ matrix.service }}

      - name: Test Go
        if: matrix.service == 'checkoutservice' || matrix.service == 'frontend' || matrix.service == 'productcatalogservice' || matrix.service == 'shippingservice'
        run: go test ./...
        working-directory: src/${{ matrix.service }}

      - name: Test .NET
        if: matrix.service == 'cartservice'
        run: dotnet test src/cartservice/tests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Determine build context
        id: context
        run: |
          if [[ "${{ matrix.service }}" == "cartservice" ]]; then
            echo "path=src/cartservice/src" >> $GITHUB_OUTPUT
          else
            echo "path=src/${{ matrix.service }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.context.outputs.path }}
          push: true
          tags: public.ecr.aws/n2m8n7v2/devops-project/${{ matrix.service }}:${{ steps.tag.outputs.tag }}
          platforms: linux/amd64,linux/arm64

  deploy:
    name: Deploy to EKS
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: build #[build, sonarqube]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Determine tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Deploy with Helm
        run: |
          helm upgrade --install onlineboutique ./helm-chart \
            --namespace onlineboutique --create-namespace \
            --set images.repository=public.ecr.aws/n2m8n7v2/devops-project \
            --set images.tag=${{ steps.tag.outputs.tag }} \
            --wait --timeout 10m
