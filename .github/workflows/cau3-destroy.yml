name: Cau3 - Terraform Destroy

on:
  workflow_dispatch:

env:
  TF_VERSION: 1.9.0
  TF_WORKING_DIR: ./terraform/cau3

jobs:
  terraform-plan-destroy:
    name: Terraform Plan Destroy
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: >
          terraform init
          -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
          -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}"
          -backend-config="region=${{ secrets.AWS_REGION }}"
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Plan Destroy
        run: terraform plan -destroy -out=tfplan-destroy
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Upload Destroy Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-destroy-cau3
          path: ${{ env.TF_WORKING_DIR }}/tfplan-destroy

  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    needs: [terraform-plan-destroy]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: >
          terraform init
          -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
          -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}"
          -backend-config="region=${{ secrets.AWS_REGION }}"
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Download Destroy Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-destroy-cau3
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Destroy
        run: terraform apply -auto-approve tfplan-destroy
        working-directory: ${{ env.TF_WORKING_DIR }}
