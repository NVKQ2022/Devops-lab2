name: "Continuous Integration - Main/Release"
on:
  # push:
  #   # run on pushes to main or release/*
  #   branches:
  #     - main
  #     - release/*
  #   paths-ignore:
  #     - '**/README.md'
  #     - 'kustomize/**'
  #     - '.github/workflows/kustomize-build-ci.yaml'
  #     - 'terraform/**'
  #     - '.github/workflows/terraform-validate-ci.yaml'
  #     - 'helm-chart/**'
  #     - '.github/workflows/helm-chart-ci.yaml'
  workflow_dispatch:
jobs:
  code-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-dotnet@v5
      env:
        DOTNET_INSTALL_DIR: "./.dotnet"
      with:
        dotnet-version: '10.0'
    - uses: actions/setup-go@v6
      with:
        go-version: '1.26'
    - name: Go Unit Tests
      timeout-minutes: 10
      run: |
        for SERVICE in "shippingservice" "productcatalogservice"; do
          echo "testing $SERVICE..."
          pushd src/$SERVICE
          go test
          popd
        done
    - name: C# Unit Tests
      timeout-minutes: 10
      run: |
        dotnet test src/cartservice/
